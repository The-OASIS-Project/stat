# OASIS STAT Configuration
# This file is sourced by the systemd service

# MQTT Settings
MQTT_HOST=localhost
MQTT_PORT=1883
MQTT_TOPIC=stat

# MQTT Authentication (leave empty to disable)
#MQTT_USERNAME=oasis
#MQTT_PASSWORD=your-password

# MQTT TLS (set to 1 or true to enable)
#MQTT_TLS=false
#MQTT_CA_CERT=/etc/mosquitto/certs/ca.crt

